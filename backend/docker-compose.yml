services:
  db:
    image: postgres:18
    container_name: hannahpay-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hannah
      POSTGRES_DB: hannahpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hannahpay"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hannahpay-network

  app:
    build: .
    container_name: hannahpay-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hannahpay
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: hannah
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hannahpay-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  hannahpay-network:
    driver: bridge
